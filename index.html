<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Recruiting Agent — Flow & Mocks</title>
<style>
  :root{
    --purple:#191841;      /* Eightfold ink-navy = primary */
    --purple-600:#10102E;
    --purple-50:#EEF0F7;
    --purple-100:#D8DCEC;
    --violet:#5E00FF;      /* Eightfold electric violet = AI / agent */
    --mint:#88E2D2;        /* Eightfold signature mint = accent */
    --mint-ink:#0C6B5C;
    --ink:#191841;
    --slate:#484B58;
    --line:#E4E7F0;
    --bg:#F7F8FC;
    --card:#FFFFFF;
    --green:#12A150; --green-bg:#E7F7EE;
    --amber:#C77700; --amber-bg:#FDF3E2;
    --red:#D3263B;   --red-bg:#FCE9EC;
    --blue:#2563EB;  --blue-bg:#E8F0FE;
    --radius:14px;
    --shadow:0 1px 2px rgba(26,21,35,.06),0 8px 24px rgba(76,29,149,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh}
  .side{width:238px;flex:0 0 238px;background:#fff;border-right:1px solid var(--line);
    padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:8px 8px 16px}
  .ef-logo{width:150px;max-width:100%;height:auto}
  .brand-sub{font-weight:600;color:var(--slate);font-size:11px;padding-left:2px}
  .nav{list-style:none;margin:0;padding:0}
  .nav li{display:flex;gap:10px;align-items:flex-start;padding:9px 10px;border-radius:10px;cursor:pointer;
    font-size:13px;color:var(--slate);line-height:1.25;margin-bottom:2px}
  .nav li:hover{background:var(--purple-50)}
  .nav li.active{background:var(--purple-50);color:var(--purple-600);font-weight:700}
  .nav .num{width:20px;height:20px;flex:0 0 20px;border-radius:6px;background:var(--purple-100);
    color:var(--purple-600);font-size:11px;font-weight:800;display:grid;place-items:center;margin-top:1px}
  .nav li.active .num{background:var(--purple);color:#fff}
  .side .divider{height:1px;background:var(--line);margin:12px 4px}
  .main{flex:1;min-width:0}
  .topbar{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;
    gap:14px;padding:0 26px;position:sticky;top:0;z-index:5}
  .role-pill{background:var(--purple-50);color:var(--purple-600);font-weight:700;font-size:12px;
    padding:5px 11px;border-radius:20px}
  .crumb{font-size:13px;color:var(--slate)}
  .crumb b{color:var(--ink)}
  .spacer{flex:1}
  .search{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12px;
    color:var(--slate);width:220px}
  .avatar{width:32px;height:32px;border-radius:50%;background:#DDD3F5;color:var(--purple-600);
    display:grid;place-items:center;font-weight:700;font-size:12px}
  .content{padding:26px 30px 60px;max-width:1120px}
  /* ---------- Generic UI ---------- */
  .h1{font-size:22px;font-weight:800;margin:0 0 3px}
  .sub{color:var(--slate);font-size:13px;margin:0 0 20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:18px 20px}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .sec-title{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);margin:0 0 12px}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:9px;font-size:13px;font-weight:700;
    padding:9px 16px;cursor:pointer;background:var(--purple);color:#fff}
  .btn:hover{background:var(--purple-600)}
  .btn.ghost{background:#fff;color:var(--purple-600);border:1px solid var(--purple-100)}
  .btn.ghost:hover{background:var(--purple-50)}
  .btn.sm{padding:6px 12px;font-size:12px}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .t-green{background:var(--green-bg);color:var(--green)}
  .t-amber{background:var(--amber-bg);color:var(--amber)}
  .t-red{background:var(--red-bg);color:var(--red)}
  .t-blue{background:var(--blue-bg);color:var(--blue)}
  .t-purple{background:var(--purple-50);color:var(--purple-600)}
  .t-grey{background:#EEF0F4;color:#65708A}
  .metric{font-size:26px;font-weight:800}
  .metric small{font-size:12px;font-weight:600;color:var(--slate);display:block;margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);
    padding:10px 12px;border-bottom:1px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .who{display:flex;align-items:center;gap:10px}
  .ava{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:11px;
    background:#E9DEFC;color:var(--purple-600);flex:0 0 30px}
  .muted{color:var(--slate);font-size:12px}
  .bar{height:7px;border-radius:6px;background:#E4E7F0;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--purple),var(--mint))}
  .list-check{list-style:none;margin:0;padding:0;font-size:13px}
  .list-check li{padding:7px 0;display:flex;gap:9px;align-items:flex-start;border-bottom:1px dashed var(--line)}
  .list-check li:last-child{border-bottom:none}
  .ck{color:var(--green);font-weight:900}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .kv:last-child{border-bottom:none}
  .kv b{font-weight:700}
  .chip{background:var(--purple-50);color:var(--purple-600);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600}
  .ai-note{background:linear-gradient(180deg,#FBFAFF,#F5F1FE);border:1px solid var(--purple-100);
    border-radius:12px;padding:14px 16px;font-size:13px;display:flex;gap:11px}
  .ai-badge{flex:0 0 auto;background:var(--violet);color:#fff;font-size:10px;font-weight:800;border-radius:6px;
    padding:3px 7px;height:fit-content;letter-spacing:.04em}
  .ring{--p:78;width:92px;height:92px;border-radius:50%;
    background:conic-gradient(var(--purple) calc(var(--p)*1%),#E4E7F0 0);display:grid;place-items:center}
  .ring > div{width:70px;height:70px;border-radius:50%;background:#fff;display:grid;place-items:center;
    font-weight:800;font-size:20px}
  /* ---------- Motion / reveal ---------- */
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .rise{opacity:0;animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  /* ---------- Hero spotlight ---------- */
  .hero-chip{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.04em;color:#fff;
    background:linear-gradient(135deg,var(--purple),var(--violet));border-radius:5px;padding:2px 6px;margin-left:6px}
  .qitem.hero{background:linear-gradient(90deg,#FAF7FF,#fff);box-shadow:inset 4px 0 0 var(--purple)}
  tr.hero td{background:#FAF7FF}
  tr.hero td:first-child{box-shadow:inset 4px 0 0 var(--purple)}
  /* ---------- Layer badge (who is acting) ---------- */
  #layerbadge{position:fixed;top:70px;right:26px;z-index:40;display:none;align-items:center;gap:8px;
    font-size:12px;font-weight:800;letter-spacing:.03em;padding:8px 14px;border-radius:22px;
    box-shadow:var(--shadow);border:1px solid transparent}
  #layerbadge.show{display:inline-flex}
  #layerbadge .pip{width:9px;height:9px;border-radius:50%}
  .lb-agent{background:#F1EBFF;color:#4A00CC;border-color:#E0D2FF!important}
  .lb-agent .pip{background:var(--violet)}
  .lb-rec{background:var(--amber-bg);color:var(--amber);border-color:#F3DDB4!important}
  .lb-rec .pip{background:var(--amber)}
  .lb-sys{background:#EEF0F4;color:#65708A}
  .lb-sys .pip{background:#65708A}
  body.present #layerbadge{top:22px;right:34px;font-size:14px;padding:10px 18px}
  /* ---------- Agent / Recruiter view toggle ---------- */
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{border:none;background:transparent;font-size:12px;font-weight:700;color:var(--slate);
    padding:6px 11px;border-radius:7px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--purple-600);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .seg.dark{background:rgba(255,255,255,.1);border:none}
  .seg.dark button{color:#B7AEC9}
  .seg.dark button.on{background:rgba(255,255,255,.22);color:#fff;box-shadow:none}
  /* ---------- Recruiter-view veil over background screens ---------- */
  #content{position:relative}
  .veil{position:absolute;inset:0;background:rgba(246,244,251,.86);backdrop-filter:blur(3px);
    display:flex;align-items:flex-start;justify-content:center;padding-top:80px;z-index:25;animation:rise .35s ease forwards}
  .veilcard{background:#fff;border:1px solid var(--purple-100);border-radius:16px;box-shadow:var(--shadow);
    padding:24px 28px;max-width:460px;text-align:center}
  .veilcard .vic{font-size:32px;margin-bottom:8px}
  .veilcard h3{margin:0 0 6px;font-size:17px}
  .veilcard p{margin:0;font-size:13px;color:var(--slate);line-height:1.5}
  .veilcard .mini-tag{display:inline-block;margin-top:12px;font-size:11px;font-weight:800;
    background:var(--purple-50);color:var(--purple-600);padding:5px 11px;border-radius:20px}
  /* ---------- Present / Record mode ---------- */
  body.present .side,body.present .topbar{display:none}
  body.present .content{max-width:1180px;margin:0 auto;padding:44px 40px 130px;font-size:15px}
  body.present .h1{font-size:30px}
  body.present .sub{font-size:16px}
  body.present .metric{font-size:34px}
  body.present .kpi .n{font-size:32px}
  body.present .qtitle{font-size:15px}
  body.present .backbar{display:none}
  body.present{background:radial-gradient(1200px 600px at 50% -5%,#E6F7F2,var(--bg))}
  .stagebar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;
    background:rgba(20,19,52,.96);color:#fff;backdrop-filter:blur(10px);
    padding:15px 30px;align-items:center;gap:24px}
  body.present .stagebar{display:flex}
  .stagebar .sc{font-size:12px;font-weight:800;letter-spacing:.1em;color:#7E77A6;
    white-space:nowrap;font-variant-numeric:tabular-nums}
  .stagebar .cap{flex:1;font-size:16px;line-height:1.5;max-width:760px;color:#ECE9F7}
  .stagebar .cap b{color:#C9B6FF;font-weight:700}
  .stage-ctrl{display:flex;align-items:center;gap:10px;margin-left:auto}
  .stagebar .stbtn{background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:10px;
    padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer}
  .stagebar .stbtn:hover{background:rgba(255,255,255,.24)}
  .stagebar .stbtn.primary{background:var(--mint);color:#10102E}
  .stagebar .stbtn.primary:hover{background:#a6ece0}
  .stagebar .exit{width:38px;height:38px;border-radius:50%;background:transparent;color:#9A93B8;
    border:none;font-size:15px;cursor:pointer;margin-left:4px}
  .stagebar .exit:hover{background:rgba(255,255,255,.12);color:#fff}
  .present-btn{background:var(--ink);color:#fff}
  .present-btn:hover{background:#000}
  /* ---------- Interactivity: hover + context modal ---------- */
  .kpi{transition:transform .12s,box-shadow .12s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(16,16,46,.1)}
  .loop li{border-radius:8px;transition:background .12s}
  .loop li:hover{background:var(--purple-50)}
  .qgo{opacity:0;color:var(--violet);font-weight:800;font-size:12px;white-space:nowrap;
    transform:translateX(-5px);transition:opacity .14s,transform .14s;align-self:center}
  .qitem:hover .qgo{opacity:1;transform:none}
  .qitem{transition:background .12s}
  table.rowlink tbody tr{cursor:pointer;transition:background .12s}
  table.rowlink tbody tr:hover td{background:#F1F5FC}
  table.rowlink tbody tr.hero:hover td{background:#E8EEFA}
  .modal-back{position:fixed;inset:0;background:rgba(16,16,46,.5);backdrop-filter:blur(3px);z-index:80;
    display:none;align-items:center;justify-content:center;padding:24px}
  .modal-back.on{display:flex;animation:rise .18s ease}
  .modal{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(16,16,46,.35);width:640px;max-width:100%;
    max-height:88vh;overflow:auto;animation:pop .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
  .modal-head{display:flex;gap:14px;align-items:flex-start;padding:20px 22px;border-bottom:1px solid var(--line)}
  .modal-head .mic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;flex:0 0 42px}
  .modal-head h2{margin:0 0 3px;font-size:17px}
  .modal-close{margin-left:auto;background:var(--bg);border:none;border-radius:9px;width:32px;height:32px;
    cursor:pointer;font-size:14px;color:var(--slate);flex:0 0 32px}
  .modal-close:hover{background:var(--line)}
  .modal-body{padding:20px 22px}
  .modal-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);margin:18px 0 9px}
  .modal-body h4:first-child{margin-top:0}
  .ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px 20px}
  .kv2{display:flex;flex-direction:column;gap:2px;font-size:13px}
  .kv2 span{font-size:11px;color:var(--slate)}
  .kv2 b{font-weight:700}
  ul.tp{list-style:none;margin:0;padding:0}
  ul.tp li{display:flex;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
  ul.tp li:last-child{border-bottom:none}
  .opt{display:flex;gap:10px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    margin-bottom:8px;font-size:13px;cursor:pointer}
  .opt:hover{border-color:var(--violet);background:#FBF9FF}
  .opt input{width:16px;height:16px;accent-color:var(--violet);cursor:pointer}
  .modal-foot{display:flex;gap:10px;align-items:center;padding:16px 22px;border-top:1px solid var(--line);
    position:sticky;bottom:0;background:#fff}
  .modal-foot .spacer{flex:1}
  .modal-success{padding:46px 24px;text-align:center}
  .modal-success .big{font-size:46px;margin-bottom:8px}
  .modal-success h2{margin:0 0 6px;font-size:19px}
  /* ---------- Recruiter Review workspace ---------- */
  .rv-track{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;margin-bottom:10px;transition:border-color .15s,box-shadow .15s,background .15s}
  .rv-track:hover{border-color:var(--purple-100);box-shadow:var(--shadow)}
  .rv-track .rv-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:800;
    font-size:12px;background:#EEF0F7;color:var(--slate);flex:0 0 30px}
  .rv-track.approved{border-color:#BFE8CF;background:linear-gradient(90deg,#F2FBF6,#fff)}
  .rv-track.approved .rv-ic{background:var(--green-bg);color:var(--green)}
  .rv-track.held{opacity:.62;border-style:dashed}
  .stepper{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:10px;padding:6px 14px}
  .stepper button{width:28px;height:28px;border-radius:7px;border:none;background:var(--purple-50);
    color:var(--purple-600);font-size:17px;font-weight:800;cursor:pointer;line-height:1}
  .stepper button:hover{background:var(--purple-100)}
  .stepper b{font-size:19px;min-width:30px;text-align:center}
  .stepper span{color:var(--slate);font-size:12px}
  .sample{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--violet);
    border-radius:8px;padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.55}
  .launch{margin-top:14px;border:1px solid #BFE8CF;background:linear-gradient(180deg,#F2FBF6,#fff);animation:rise .35s ease}
  /* ---------- NL command box ---------- */
  .cmdbar{margin-bottom:14px;border:1px solid var(--purple-100);background:linear-gradient(180deg,#FBFAFF,#F6F3FE)}
  .cmdrow{display:flex;gap:10px;align-items:center}
  .cmdai{width:32px;height:32px;border-radius:9px;background:var(--violet);color:#fff;display:grid;place-items:center;font-size:16px;flex:0 0 32px}
  #cmdinput{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink)}
  #cmdinput:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(94,0,255,.12)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .chips button{background:#fff;border:1px solid var(--purple-100);color:var(--purple-600);border-radius:20px;
    padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
  .chips button:hover{background:var(--purple-50);border-color:var(--violet);color:var(--violet)}
  .agent-reply{display:flex;gap:10px;margin-top:13px;background:#fff;border:1px solid var(--purple-100);
    border-radius:11px;padding:12px 14px;font-size:13px;line-height:1.55;animation:rise .3s ease}
  .agent-reply .ab{flex:0 0 auto;background:var(--violet);color:#fff;font-size:10px;font-weight:800;
    border-radius:6px;padding:3px 7px;height:fit-content;letter-spacing:.04em}
  .note-chip{display:inline-block;background:var(--purple-50);color:var(--violet);font-size:10px;font-weight:800;
    border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle}
  @keyframes flashfx{0%{background:#ECE2FF}60%{background:#F6F1FF}100%{background:#fff}}
  .rv-track.flash{animation:flashfx 1.2s ease}
  /* ---------- Agent working micro-animations ---------- */
  .working{display:inline-flex;align-items:center;gap:11px;margin-bottom:16px;position:relative;overflow:hidden;
    background:linear-gradient(90deg,#F3EEFF,#E9F7F3);border:1px solid var(--purple-100);border-radius:22px;
    padding:8px 16px 8px 11px;font-size:12.5px;color:var(--ink)}
  .working:after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:sweep 2.4s infinite}
  @keyframes sweep{100%{transform:translateX(100%)}}
  .work-orb{width:19px;height:19px;border-radius:50%;flex:0 0 19px;border:2.5px solid var(--purple-100);
    border-top-color:var(--violet);animation:spin .8s linear infinite}
  @keyframes spin{100%{transform:rotate(360deg)}}
  .work-txt b{color:var(--violet)}
  .work-txt span{transition:opacity .18s}
  .work-dots{display:inline-flex;gap:3px;margin-left:3px}
  .work-dots i{width:5px;height:5px;border-radius:50%;background:var(--violet);opacity:.4;animation:bob 1s infinite}
  .work-dots i:nth-child(2){animation-delay:.15s}
  .work-dots i:nth-child(3){animation-delay:.3s}
  @keyframes bob{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
  .scanning{position:relative;overflow:hidden}
  .scanning:before{content:"";position:absolute;left:0;right:0;top:0;height:2px;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,transparent,var(--mint),var(--violet),transparent);animation:scanline 2.6s ease-in-out infinite}
  @keyframes scanline{0%{top:0;opacity:0}10%{opacity:1}50%{top:calc(100% - 2px);opacity:1}90%{opacity:1}100%{top:0;opacity:0}}
  .feed{list-style:none;margin:0;padding:0}
  .feedline{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);
    font-size:13px;animation:slideIn .35s ease}
  .feedline:last-child{border-bottom:none}
  .feedline .fdot{width:7px;height:7px;border-radius:50%;background:var(--mint);flex:0 0 7px}
  .feedline .fic{width:22px;text-align:center;flex:0 0 22px}
  .feedline .ftime{margin-left:auto;font-size:11px;color:var(--slate);white-space:nowrap}
  .tag.evaluating{animation:pulse2 1s infinite}
  @keyframes pulse2{0%,100%{opacity:.45}50%{opacity:1}}
  @keyframes cellflash{0%{background:#EAF7F3}100%{background:transparent}}
  .flashcell{animation:cellflash 1s ease;border-radius:6px}
  /* ---------- Role Filled · share wrap-up ---------- */
  .rcpt{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
  .rcpt:hover{border-color:var(--purple-100)}
  .rcpt.on{border-color:#BFE8CF;background:linear-gradient(90deg,#F5FBF7,#fff)}
  .rcpt input{width:16px;height:16px;accent-color:var(--violet);cursor:pointer;flex:0 0 16px}
  .rcpt-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);margin:0 0 9px}
  .summary-card{border:1px solid var(--line);border-left:3px solid var(--violet);border-radius:10px;padding:14px 16px;font-size:13px;background:var(--bg)}
  /* ---------- Multi-channel outreach rows ---------- */
  .chrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px}
  .chrow .chico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:14px;font-weight:800;
    flex:0 0 30px;background:var(--purple-50);color:var(--purple-600)}
  .chrow .chbody{flex:1;min-width:0}
  .chrow .cht{font-weight:700;font-size:13px}
  .chrow .chs{font-size:11px;color:var(--slate)}
  .chstatus .tag{white-space:nowrap}
  /* ---------- Scheduling coordination chat ---------- */
  .chat-hd{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12.5px;margin-bottom:10px}
  .chat-hd .ch-ic{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;flex:0 0 24px}
  .chat-hd.wa .ch-ic{background:#25D366}
  .chat-hd.sl .ch-ic{background:#611f69}
  .chat{display:flex;flex-direction:column;gap:8px}
  .bub{max-width:90%;font-size:12.5px;line-height:1.45;padding:8px 11px;border-radius:13px}
  .bub .who{font-weight:700;font-size:10.5px;opacity:.85;display:block;margin-bottom:2px}
  .bub .bt{display:block;font-size:10px;margin-top:3px;opacity:.7}
  .bub-them{align-self:flex-start;background:var(--bg);border:1px solid var(--line);border-bottom-left-radius:4px;color:var(--ink)}
  .bub-agent{align-self:flex-end;background:var(--violet);color:#fff;border-bottom-right-radius:4px}
  .bub-agent .who{opacity:.8}
  .sched-lock{margin-top:14px;border:1px solid #BFE8CF;background:linear-gradient(180deg,#F2FBF6,#fff);
    border-radius:12px;padding:14px 16px;display:flex;gap:13px;align-items:center}
  .sched-lock .lk{font-size:24px;flex:0 0 auto}
  /* ---------- Guided walkthrough ---------- */
  #tour{display:none;position:fixed;inset:0;z-index:90}
  #tour.on{display:block}
  #tourhole{position:absolute;border-radius:12px;box-shadow:0 0 0 9999px rgba(16,16,46,.55);
    transition:all .3s cubic-bezier(.2,.8,.2,1);pointer-events:none}
  #tourpop{position:absolute;width:328px;max-width:calc(100vw - 28px);background:var(--violet);color:#fff;
    border-radius:14px;box-shadow:0 18px 50px rgba(16,16,46,.4);padding:16px 18px;transition:top .3s ease,left .3s ease}
  #tourpop:after{content:"";position:absolute;width:0;height:0;border:10px solid transparent}
  #tourpop.below:after{top:-19px;left:var(--arrow,26px);border-bottom-color:var(--violet)}
  #tourpop.above:after{bottom:-19px;left:var(--arrow,26px);border-top-color:var(--violet)}
  #tourpop.right:after{left:-19px;right:auto;top:var(--arrowy,26px);border-right-color:var(--violet)}
  #tourpop.left:after{right:-19px;left:auto;top:var(--arrowy,26px);border-left-color:var(--violet)}
  #tourpop h4{margin:7px 0 5px;font-size:15px;color:#fff}
  #tourpop p{margin:0;font-size:13px;color:rgba(255,255,255,.9);line-height:1.5}
  .tour-dots{display:flex;gap:5px}
  .tour-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45)}
  .tour-dots span.on{background:#fff;width:18px;border-radius:4px}
  .tour-nav{display:flex;align-items:center;gap:8px;margin-top:15px;flex-wrap:nowrap}
  .tour-nav .spacer{flex:1}
  .tour-skip{background:transparent;border:none;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;
    cursor:pointer;padding:6px 2px;text-decoration:underline;white-space:nowrap}
  .tour-skip:hover{color:#fff}
  #tourback{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff}
  #tourback:hover{background:rgba(255,255,255,.15)}
  #tournext{background:#fff;color:var(--violet)}
  #tournext:hover{background:#EDE7FF}
  /* ---------- Mission Control ---------- */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .kpi .n{font-size:24px;font-weight:800}
  .kpi .l{font-size:12px;color:var(--slate);margin-top:2px}
  .kpi.hot{border-color:#F3C7CE;background:linear-gradient(180deg,#FFF,#FEF4F6)}
  .kpi.hot .n{color:var(--red)}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .mc{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:18px}
  @media(max-width:1000px){.mc{grid-template-columns:1fr}}
  .qhead{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .qcount{background:var(--red);color:#fff;font-size:12px;font-weight:800;border-radius:20px;padding:2px 9px}
  .filters{display:flex;gap:6px;margin-left:auto}
  .filters button{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;color:var(--slate);cursor:pointer}
  .filters button.on{background:var(--purple);color:#fff;border-color:var(--purple)}
  .qitem{display:flex;gap:13px;padding:14px 18px;border-bottom:1px solid var(--line);align-items:flex-start;cursor:pointer}
  .qitem:last-child{border-bottom:none}
  .qitem:hover{background:var(--purple-50)}
  .qic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;flex:0 0 36px}
  .qbody{flex:1;min-width:0}
  .qtop{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .qtitle{font-weight:700;font-size:13.5px}
  .qwhy{font-size:12px;color:var(--slate);line-height:1.45}
  .qmeta{font-size:11px;color:#8B8698;margin-top:5px}
  .qactions{display:flex;gap:7px;flex:0 0 auto;align-items:center}
  .src{font-size:10px;font-weight:800;letter-spacing:.03em;padding:2px 7px;border-radius:5px;background:#EDEAF6;color:var(--purple-600)}
  .loop{list-style:none;margin:0;padding:0}
  .loop li{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--line);cursor:pointer}
  .loop li:last-child{border-bottom:none}
  .loop li:hover .st{color:var(--purple-600)}
  .loop .sn{width:22px;height:22px;flex:0 0 22px;border-radius:7px;font-size:11px;font-weight:800;display:grid;place-items:center;background:var(--purple-100);color:var(--purple-600)}
  .loop li.human .sn{background:var(--amber);color:#fff}
  .loop .st{font-size:12.5px;font-weight:600}
  .loop .sd{font-size:11px;color:var(--slate)}
  .loop .tick{margin-left:auto;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
  .auto{background:var(--green-bg);color:var(--green)}.hum{background:var(--amber-bg);color:var(--amber)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--slate);margin-top:12px}
  .legend span{display:flex;align-items:center;gap:5px}
  .dotc{width:9px;height:9px;border-radius:50%}
  .activity{margin-top:14px;background:linear-gradient(180deg,#FBFAFF,#F5F1FE);border:1px solid var(--purple-100);border-radius:11px;padding:12px 14px}
  .activity .row{display:flex;gap:8px;font-size:12px;padding:4px 0;color:var(--slate)}
  .activity .row b{color:var(--ink)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);flex:0 0 8px;margin-top:5px;box-shadow:0 0 0 0 rgba(18,161,80,.5);animation:pz 1.8s infinite}
  @keyframes pz{0%{box-shadow:0 0 0 0 rgba(18,161,80,.5)}70%{box-shadow:0 0 0 7px rgba(18,161,80,0)}100%{box-shadow:0 0 0 0 rgba(18,161,80,0)}}
  .track9{display:flex;gap:3px;align-items:center}
  .seg9{width:16px;height:6px;border-radius:3px;background:#E4E7F0}
  .seg9.done{background:var(--purple)}
  .seg9.cur{background:var(--mint)}
  .seg9.cur-h{background:var(--amber)}
  .hbar{width:60px;height:7px;border-radius:6px;background:#E4E7F0;overflow:hidden;display:inline-block;vertical-align:middle}
  .hbar>i{display:block;height:100%}
  .needyou{color:var(--red);font-weight:800;font-size:12px}
  .mini{font-size:11px;color:var(--slate)}
  /* borrowed: confidence + evidence chips */
  .conf{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .qchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .echip{font-size:10.5px;font-weight:600;color:var(--slate);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  /* borrowed: header activity pills */
  .hpill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;margin-bottom:2px}
  .hp-run{background:var(--purple-50);color:var(--purple-600)}
  .hp-run .hp-dot{width:7px;height:7px;border-radius:50%;background:var(--violet);animation:pz 1.8s infinite}
  .hp-app{background:var(--amber-bg);color:var(--amber)}
  /* borrowed: comparative KPI sub-labels */
  .kpi-sub{font-size:11px;color:var(--slate);margin-top:6px;font-weight:600}
  .kpi-sub.good{color:var(--green)}
  .kpi-sub.bad{color:var(--red)}
  /* borrowed: autonomy dial */
  .auton{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:11px;
    font-weight:800;padding:5px 9px;cursor:pointer;white-space:nowrap}
  .auton:hover{filter:brightness(.97)}
  .al-Suggest{color:var(--violet);border-color:#E0D2FF;background:#F5F1FF}
  .al-Approve{color:var(--amber);border-color:#F3DDB4;background:var(--amber-bg)}
  .al-Auto{color:var(--green);border-color:#BFE8CF;background:var(--green-bg)}
  .al-Watch{color:#65708A;border-color:var(--line);background:#EEF0F4}
  /* ---------- Landing page ---------- */
  .landing{max-width:960px;margin:0 auto;text-align:center;padding:24px 10px 40px}
  .land-logo-img{width:240px;max-width:82%;height:auto;display:block;margin:10px auto 14px}
  .land-tag{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--violet)}
  .land-h1{font-size:34px;font-weight:800;margin:8px 0 10px}
  .land-sub{font-size:15px;color:var(--slate);line-height:1.6;max-width:640px;margin:0 auto 30px}
  .land-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:left}
  @media(max-width:820px){.land-cards{grid-template-columns:1fr}}
  .land-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s}
  .land-card:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(76,29,149,.14);border-color:var(--purple-100)}
  .lc-ic{width:40px;height:40px;border-radius:11px;background:var(--purple-50);color:var(--violet);
    display:grid;place-items:center;font-size:18px;font-weight:800;margin-bottom:12px}
  .land-card h3{margin:0 0 6px;font-size:16px}
  .land-card p{margin:0 0 12px;font-size:12.5px;color:var(--slate);line-height:1.5}
  .lc-go{font-size:12px;font-weight:800;color:var(--violet)}
  .land-hint{margin-top:26px;font-size:12.5px;color:var(--slate);background:var(--purple-50);
    border-radius:12px;padding:12px 16px;display:inline-block;max-width:640px}
  /* ---------- Flow overview page ---------- */
  .flow-head{text-align:center;margin-bottom:26px}
  .flow-head h1{font-size:26px;margin:0 0 6px}
  .flow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:900px){.flow-grid{grid-template-columns:1fr}}
  .phase{border:1px solid var(--purple-100);background:linear-gradient(180deg,#FAF8FF,#EFF7F4);
    border-radius:16px;padding:15px;margin-bottom:16px;box-shadow:var(--shadow)}
  .phase-hd{font-size:12.5px;color:var(--slate);margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .phase-tag{background:var(--violet);color:#fff;font-size:10px;font-weight:800;letter-spacing:.04em;border-radius:6px;padding:3px 8px}
  .phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:900px){.phase-grid{grid-template-columns:1fr}}
  .loop li.prep{box-shadow:inset 2px 0 0 var(--violet);padding-left:9px}
  .loop-phase{font-size:10px;font-weight:800;letter-spacing:.05em;color:var(--violet);text-transform:uppercase;
    padding:2px 0 4px!important;border-bottom:none!important}
  .fnode{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
  .fnode:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(76,29,149,.14);border-color:var(--purple-100)}
  .fnode .n{width:30px;height:30px;border-radius:9px;background:var(--purple);color:#fff;font-weight:800;
    display:grid;place-items:center;font-size:14px;margin-bottom:10px}
  .fnode h3{margin:0 0 6px;font-size:15px}
  .fnode p{margin:0 0 10px;font-size:12px;color:var(--slate);line-height:1.45}
  .fnode .out{font-size:11px;color:var(--purple-600);font-weight:700}
  .fnode .stripe{position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--purple),var(--mint))}
  .term{text-align:center;margin:22px auto 0;max-width:420px;background:var(--purple);color:#fff;border-radius:14px;
    padding:16px;font-weight:700}
  .backbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .backbtn{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 13px;font-size:13px;
    font-weight:700;cursor:pointer;color:var(--purple-600)}
  .backbtn:hover{background:var(--purple-50)}
  .stepnav{display:flex;gap:8px;margin-left:auto}
  .stepnav button{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;
    cursor:pointer;font-weight:700;color:var(--slate)}
  .stepnav button:hover{background:var(--purple-50);color:var(--purple-600)}
  .stepnav button:disabled{opacity:.4;cursor:default}
  .screen{display:none}
  .screen.on{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .flag{display:flex;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:12px;align-items:flex-start;background:#fff}
  .flag .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:0 0 34px}
  .timeline{list-style:none;margin:0;padding:0;position:relative}
  .timeline:before{content:"";position:absolute;left:15px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .timeline li{position:relative;padding:0 0 18px 44px}
  .timeline li .dot{position:absolute;left:8px;top:1px;width:16px;height:16px;border-radius:50%;
    background:#fff;border:3px solid var(--purple)}
  .timeline li.done .dot{background:var(--purple)}
  .timeline li.now .dot{border-color:var(--amber);box-shadow:0 0 0 4px var(--amber-bg)}
  .timeline li h4{margin:0 0 2px;font-size:14px}
  .timeline li p{margin:0;font-size:12px;color:var(--slate)}
</style>
</head>

}

const TOUR = [
  {sel:'#mcqueue', title:'Start here: what needs you', text:'This is your only to-do list — the moments the agent can\'t handle alone. Click any card to see the agent\'s reasoning and act on it.'},
  {sel:'#mcloop', title:'The agent runs the rest', text:'All 9 steps run automatically. Purple steps are fully autonomous; amber ones (3, 7, 8) surface to you in the queue above.'},
  {sel:'#mcportfolio', title:'Manage by exception', text:'Every open role and where it sits in the flow. Click any row for details. You\'re steering 18 reqs without touching most of them.'}
];
let tourIndex=0, tourSeen=false;
function startTour(){ tourIndex=0; document.getElementById('tour').classList.add('on'); showTourStep(); }
function endTour(){ document.getElementById('tour').classList.remove('on'); tourSeen=true; }
function tourNext(){ if(tourIndex>=TOUR.length-1){ endTour(); } else { tourIndex++; showTourStep(); } }
function tourPrev(){ if(tourIndex>0){ tourIndex--; showTourStep(); } }
function showTourStep(){
  const s=TOUR[tourIndex];
  const el=document.querySelector(s.sel);
  if(!el){ endTour(); return; }
  el.scrollIntoView({block:'center',behavior:'smooth'});
  setTimeout(()=>{
    const r=el.getBoundingClientRect(), pad=8;
    const hole=document.getElementById('tourhole');
    hole.style.left=(r.left-pad)+'px'; hole.style.top=(r.top-pad)+'px';
    hole.style.width=(r.width+pad*2)+'px'; hole.style.height=(r.height+pad*2)+'px';
    document.getElementById('tourtitle').textContent=s.title;
    document.getElementById('tourtext').textContent=s.text;
    document.getElementById('tourdots').innerHTML=TOUR.map((_,i)=>`<span class="${i===tourIndex?'on':''}"></span>`).join('');
    document.getElementById('tourback').style.visibility=tourIndex===0?'hidden':'visible';
    document.getElementById('tournext').textContent=tourIndex===TOUR.length-1?'Got it!':'Next ›';
    const pop=document.getElementById('tourpop'), pw=328, gap=16, mrg=12;
    const ph=pop.offsetHeight||170, vw=window.innerWidth, vh=window.innerHeight;
    const tall=r.height>vh*0.5;
    let placement, top, left;
    if(tall && vw-r.right>=pw+gap){                 // beside, to the right
      placement='right'; left=r.right+gap;
      top=Math.min(Math.max(mrg, r.top+r.height/2-ph/2), vh-ph-mrg);
    } else if(tall && r.left>=pw+gap){              // beside, to the left
      placement='left'; left=r.left-pw-gap;
      top=Math.min(Math.max(mrg, r.top+r.height/2-ph/2), vh-ph-mrg);
    } else if(vh-r.bottom>=ph+gap){                 // below
      placement='below'; top=r.bottom+gap;
      left=Math.min(Math.max(mrg, r.left), vw-pw-mrg);
    } else {                                        // above
      placement='above'; top=Math.max(mrg, r.top-ph-gap);
      left=Math.min(Math.max(mrg, r.left), vw-pw-mrg);
    }
    pop.classList.remove('below','above','left','right'); pop.classList.add(placement);
    if(placement==='below'||placement==='above'){
      pop.style.setProperty('--arrow', Math.min(Math.max(16, r.left+r.width/2-left), pw-16)+'px');
    } else {
      pop.style.setProperty('--arrowy', Math.min(Math.max(16, r.top+r.height/2-top), ph-16)+'px');
    }
    pop.style.top=top+'px'; pop.style.left=left+'px';
  }, 320);
}

function trackHtml(now,human){
  let out='';
  for(let i=1;i<=9;i++){
    let cls='seg9';
    if(i<now)cls+=' done'; else if(i===now)cls+= human?' cur-h':' cur';
    out+=`<span class="${cls}"></span>`;
  }
  const title=(STEPS.find(s=>s.n===now)||{}).title||'';
  return `<div class="track9">${out}</div><div class="mini" style="margin-top:6px">Step ${now} of 9${title?' · '+title:''}</div>`;
}

function rvQuick(t){ const el=document.getElementById('cmdinput'); if(el) el.value=t; rvCommand(t); }
function rvCommand(text){
  text=(text||'').trim(); if(!text) return;
  const q=text.toLowerCase();
  const T=reviewState.tracks;
  T.forEach(t=>{ t.changed=false; });
  const find=k=>T.find(t=>t.name.toLowerCase().includes(k));
  const toTop=t=>{ if(!t) return; const i=T.indexOf(t); if(i>0){ T.splice(i,1); T.unshift(t); } t.changed=true; };
  const note=(t,n)=>{ if(t){ t.note=n; t.changed=true; } };
  const msgs=[];
  // 1) prioritize internal
  if(/internal|mobilit/.test(q) && /(priorit|first|top|focus|lead)/.test(q)){
    const t=find('internal'); toTop(t); note(t,'↑ prioritized'); t.status='approved';
    msgs.push("Moved <b>internal candidates</b> to the top and pre-approved that track — internal mobility usually fills fastest, so this should cut time-to-fill.");
  }
  // 2) hold external / outreach
  if(/(hold|pause|stop|skip|freeze)/.test(q) && /(external|outreach|cold|contact|candidate)/.test(q)){
    const t=find('contact'); if(t){ t.status='held'; note(t,'⏸ held'); }
    msgs.push("Put <b>candidate outreach on hold</b>. I'll lean on internal, referrals and refreshed profiles first, and flag you if coverage drops.");
  }
  // 3) more referrals
  if(/referr|champion/.test(q) && /(more|add|increase|boost|expand|double)/.test(q)){
    const t=find('referral'); if(t){ t.count+= /double/.test(q)?t.count:8; note(t,'↑ increased'); }
    msgs.push(`Increased <b>referral champions</b> to ${find('referral').count}. Referrals convert ~2× faster here, so it's a strong lever.`);
  }
  // 4) focus silver medalists / refresh
  if(/silver|medalist|refresh|re-?engage/.test(q) && /(focus|priorit|first|more|top|lead)/.test(q)){
    const t=find('refresh'); toTop(t); t.count+=6; note(t,'↑ prioritized · +6');
    msgs.push("Prioritized <b>silver-medalists & profile refresh</b> and widened it by 6 — these are pre-vetted, so expect faster qualified replies.");
  }
  // 5) reduce volume
  if(/(reduce|fewer|less|lower|smaller|trim|tighten)/.test(q) && /(volume|outreach|candidates|all|number|plan|reach)/.test(q)){
    T.forEach(t=>{ const b=t.count; t.count=Math.round(t.count*0.6); if(t.count!==b){ t.changed=true; note(t,'↓ trimmed'); } });
    msgs.push("Trimmed each track ~40% for a <b>tighter, higher-precision plan</b> — fewer people, higher intent.");
  }
  // 6) broaden / diversity of slate
  if(/divers|underrepresented|broaden|wider|balanced|bigger slate|more reach/.test(q)){
    const r=find('refresh'), c=find('contact');
    if(r){ r.count+=8; note(r,'↑ widened'); } if(c){ c.count+=4; note(c,'↑ widened'); }
    msgs.push("Widened top-of-funnel sourcing (refresh +8, outreach +4) to build a <b>broader, more balanced slate</b> before screening.");
  }
  // 7) generic increase outreach (only if nothing else matched)
  if(msgs.length===0 && /(more|increase|expand|widen|scale)/.test(q) && /(candidate|outreach|reach|pipeline|top|funnel)/.test(q)){
    const t=find('contact'); if(t){ t.count+=6; note(t,'↑ +6'); }
    msgs.push(`Widened <b>candidate outreach</b> to ${find('contact').count} to build more top-of-funnel coverage.`);
  }
  reviewState.lastReply = msgs.length
    ? msgs.join(' ')
    : "I can reprioritize pools, change volume, or hold tracks. Try: “prioritize internal first”, “add more referrals”, “hold external outreach”, or “reduce volume”.";
  rvRender();
}
function rvRender(){ const el=document.getElementById('reviewroot'); if(el) el.innerHTML=reviewBody(); }

}
function channelFlip(scr){
  const cells=scr.querySelectorAll('.chstatus');
  cells.forEach(c=>{ if(!c.dataset.final) c.dataset.final=c.innerHTML;
    c.innerHTML='<span class="tag t-grey evaluating">Sending…</span>'; });
  cells.forEach((c,i)=>later(()=>{ c.innerHTML=c.dataset.final; c.classList.add('flashcell');
    later(()=>c.classList.remove('flashcell'),1000); }, 550 + i*420));
}
function schedCoord(scr){
  const bubs=[...scr.querySelectorAll('.bub')].sort((a,b)=>a.dataset.seq-b.dataset.seq);
  bubs.forEach(b=>{ b.style.opacity=0; b.style.transform='translateY(7px)'; });
  const lock=scr.querySelector('.sched-lock'); if(lock) lock.style.opacity=0;
  bubs.forEach((b,i)=>later(()=>{ b.style.transition='opacity .35s,transform .35s'; b.style.opacity=1; b.style.transform='none'; }, 500 + i*680));
  if(lock) later(()=>{ lock.style.transition='opacity .45s'; lock.style.opacity=1; }, 500 + bubs.length*680 + 300);
}
function playScene(key){
  const scr=document.querySelector('#content .screen'); if(!scr) return;
  if(key==='s1') revealSeq(scr.querySelectorAll('.pill-row .chip, .pill-row .tag'), 130);
  if(key==='s2') revealSeq(scr.querySelectorAll('tbody .qrow'), 240);
  if(key==='s4'){ revealSeq(scr.querySelectorAll('.list-check li'), 130); execFeed(scr); }
  if(key==='s5') qualifyFlip(scr);
  if(key==='s6'){ channelFlip(scr); schedCoord(scr); }
  if(key==='s9') autoSendSummary();
}
function runFX(key){
  clearFX();
  document.querySelectorAll('[data-count]').forEach(countUp);
  const ring = document.getElementById('confring');
  if(ring){ ring.style.transition='none'; ring.style.setProperty('--p',0);
    requestAnimationFrame(()=>{ ring.style.transition='background 1s ease'; ring.style.setProperty('--p',82); }); }
  if(LAYER[key]==='agent'){ startWorking(key); playScene(key); } else stopWorking();
}
/* auto-add gentle reveal to freshly rendered cards not already animated */
function autoReveal(){
  document.querySelectorAll('#content .card:not(.rise)').forEach((c,i)=>{
    c.style.opacity=0; c.style.animation=`rise .5s cubic-bezier(.2,.7,.2,1) ${0.03*i}s forwards`;
  });
}
/* demo: clearing a Needs-You item drops the counter 7 -> 6 */
function demoResolve(){
  const c=document.getElementById('needcount'); if(!c) return;
  c.textContent=6; c.parentElement.classList.add('rise');
}

/* ---------- Present / record mode ---------- */
const SCENES = [
  ['mc',    'Meet <b>Robin</b>. 18 open roles, 400+ candidates in motion. Her AI recruiter runs everything autonomously — and surfaces only the <b>7 moments that need a human</b>.'],
  ['overview','This is the loop running behind the scenes: <b>nine steps</b>, from a role opening to candidates <b>sourced, screened and scheduled</b>. Let\'s follow one hire — <b>Senior Backend Engineer</b>.'],
  ['s1',    'The moment the role opens, the agent <b>reads the job</b>, learns from past hires, and predicts difficulty and time-to-fill — with a confidence score.'],
  ['s2',    'It builds a <b>talent plan</b> across five pools — top matches, silver-medalists, internal mobility, referral champions, and external expansion only if needed.'],
  ['s3',    'Robin sees <b>one plan</b>, not a hundred tasks. Approve all in a click — nothing sends until she says go.'],
  ['s4',    'Approved. The agent <b>executes four tracks in parallel</b> — personalized outreach, profile refresh, referral campaigns, internal notices.'],
  ['s5',    'As replies come in, the agent <b>qualifies and scores</b> each one: interested? qualified? needs a human?'],
  ['s6',    'A <b>scheduling agent</b> takes over — coordinating calendars, panels, time zones and reminders, right up to the interview. The offer stays human-led.'],
  ['s7',    'And it knows when to stop. <b>"I recommend calling this candidate."</b> Competing offers and executives get a human — Robin.'],
  ['s8',    'It never sleeps — <b>watching pipeline health</b> and auto-recommending fixes the moment a role weakens.'],
  ['s9',    'Role filled — <b>7 days ahead of prediction</b>. The agent writes the retrospective, <b>sends the efficiency summary to every stakeholder</b>, and feeds every lesson back to make the next hire smarter.'],
];
let scene = 0, presenting = false;
function enterPresent(){
  presenting = true; document.body.classList.add('present');
  document.getElementById('stagebar').style.display='flex';
  scene = 0; gotoScene(0);
}
function exitPresent(){
  presenting = false; document.body.classList.remove('present');
  document.getElementById('stagebar').style.display='none';
}
function gotoScene(i){
  scene = Math.max(0, Math.min(SCENES.length-1, i));
  const [key,cap] = SCENES[scene];
  go(key);
  document.getElementById('sccap').innerHTML = cap;
  document.getElementById('scnum').textContent = `${String(scene+1).padStart(2,'0')} / ${SCENES.length}`;
}
function nextScene(){ gotoScene((scene+1) % SCENES.length); }
function prevScene(){ gotoScene((scene-1+SCENES.length) % SCENES.length); }
document.addEventListener('keydown', e=>{
  if(!presenting) return;
  if(e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextScene(); }
  if(e.key==='ArrowLeft') { e.preventDefault(); prevScene(); }
  if(e.key==='Escape') exitPresent();
});

renderNav();
go('home');
</script>
